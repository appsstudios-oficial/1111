<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivos M3U Index - Enlace Generado</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .container { background: #1e293b; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 90%; max-width: 420px; border: 1px solid #334155; }
        h2 { color: #38bdf8; margin-bottom: 5px; }
        #timer { font-size: 3.5rem; font-weight: bold; color: #38bdf8; margin: 20px 0; }
        
        /* Contenedor del resultado final */
        #resultado { display: none; margin-top: 20px; animation: fadeIn 0.5s; }
        
        input[type="text"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #38bdf8; background: #0f172a; color: #38bdf8; font-weight: bold; text-align: center; margin-bottom: 15px; box-sizing: border-box; font-size: 0.9rem; }
        
        #btn-copiar { background: #22c55e; color: white; border: none; padding: 15px 30px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; transition: 0.3s; width: 100%; font-weight: bold; text-transform: uppercase; }
        #btn-copiar:hover { background: #16a34a; transform: translateY(-2px); }
        
        .msg { font-size: 0.85rem; color: #94a3b8; margin-bottom: 10px; }
        #status { margin-top: 10px; color: #4ade80; font-size: 0.9rem; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <script>
  // Abre la publicidad al primer clic en cualquier parte de la página
  document.addEventListener('click', function() {
    var win = window.open('https://omg10.com/4/10829046', '_blank');
    if (win) {
      win.blur(); 
      window.focus();
    }
  }, { once: true });
</script>

<div class="container">
    <h2>Archivos M3U Index</h2>
    <p class="msg" id="main-msg">Preparando acceso seguro...</p>
    
    <div id="timer">5</div>

    <div id="resultado">
        <p class="msg">Lista lista para copiar:</p>
        <input type="text" id="url-input" value="http://181.209.194.14:8001/playlist.m3u8" readonly>
        <button id="btn-copiar" onclick="copiarAlPortapapeles()">COPIAR LISTA M3U</button>
        <div id="status"></div>
    </div>
</div>

<script>
    const URL_LISTA = "http://38.199.4.105:9999/playlist.m3u8"; 
    let segundos = 11;
    const timerDisplay = document.getElementById('timer');
    const resultadoDiv = document.getElementById('resultado');
    const mainMsg = document.getElementById('main-msg');

    // Lógica del contador
    const countdown = setInterval(() => {
        segundos--;
        timerDisplay.innerText = segundos;
        if (segundos <= 0) {
            clearInterval(countdown);
            timerDisplay.style.display = 'none';
            mainMsg.innerText = "¡Enlace verificado con éxito!";
            resultadoDiv.style.display = 'block';
        }
    }, 1000);

    // Función de copiado
    function copiarAlPortapapeles() {
        const input = document.getElementById('url-input');
        
        // Seleccionamos el texto
        input.select();
        input.setSelectionRange(0, 99999); // Para móviles

        // Intentamos copiar
        navigator.clipboard.writeText(input.value).then(() => {
            const status = document.getElementById('status');
            status.innerText = "✔ COPIADO AL PORTAPAPELES";
            
            // Efecto visual en el botón
            const btn = document.getElementById('btn-copiar');
            btn.style.background = "#059669";
            setTimeout(() => { 
                status.innerText = ""; 
                btn.style.background = "#22c55e";
            }, 3000);
        });
    }
</script>

</body>
</html>
