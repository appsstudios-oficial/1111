<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivos M3U Index - Enlace Generado</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .container { background: #1e293b; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 90%; max-width: 420px; border: 1px solid #334155; }
        h2 { color: #38bdf8; margin-bottom: 5px; }
        #timer { font-size: 3.5rem; font-weight: bold; color: #38bdf8; margin: 20px 0; }
        #resultado { display: none; margin-top: 20px; animation: fadeIn 0.5s; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #38bdf8; background: #0f172a; color: #38bdf8; font-weight: bold; text-align: center; margin-bottom: 15px; box-sizing: border-box; font-size: 0.9rem; }
        #btn-copiar { background: #22c55e; color: white; border: none; padding: 15px 30px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; transition: 0.3s; width: 100%; font-weight: bold; text-transform: uppercase; }
        #btn-copiar:hover { background: #16a34a; transform: translateY(-2px); }
        #status { margin-top: 10px; color: #4ade80; font-size: 0.9rem; font-weight: bold; height: 20px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h2>Archivos M3U Index</h2>
    <p id="main-msg" style="color: #94a3b8; font-size: 0.85rem;">Preparando acceso seguro...</p>
    
    <div id="timer">10</div>

    <div id="resultado">
        <p style="color: #94a3b8; font-size: 0.85rem;">Lista lista para copiar:</p>
        <input type="text" id="url-input" value="http://181.224.255.210:8001/playlist.m3u8" readonly>
        <button id="btn-copiar">COPIAR LISTA M3U</button>
        <div id="status"></div>
    </div>
</div>

<script>
    let segundos = 10;
    const timerDisplay = document.getElementById('timer');
    const resultadoDiv = document.getElementById('resultado');
    const mainMsg = document.getElementById('main-msg');
    const btnCopiar = document.getElementById('btn-copiar');
    const inputUrl = document.getElementById('url-input');
    const status = document.getElementById('status');

    // Contador inicial
    const countdown = setInterval(() => {
        segundos--;
        timerDisplay.innerText = segundos;
        if (segundos <= 0) {
            clearInterval(countdown);
            timerDisplay.style.display = 'none';
            mainMsg.innerText = "¡Enlace verificado!";
            resultadoDiv.style.display = 'block';
        }
    }, 1000);

    // Evento de clic principal
    btnCopiar.addEventListener('click', function() {
        // 1. PRIORIDAD: COPIAR
        inputUrl.select();
        inputUrl.setSelectionRange(0, 99999); // Para móviles

        try {
            // Usamos el método tradicional para asegurar compatibilidad inmediata durante el click
            document.execCommand('copy');
            status.innerText = "✔ COPIADO AL PORTAPAPELES";
            btnCopiar.style.background = "#059669";
        } catch (err) {
            // Si falla el tradicional, intentamos el moderno
            navigator.clipboard.writeText(inputUrl.value);
            status.innerText = "✔ COPIADO AL PORTAPAPELES";
        }

        // 2. SEGUNDO: PUBLICIDAD (con retraso de 800ms)
        // Esto permite que el sistema operativo registre el "Copiar" antes de cambiar de ventana
        setTimeout(function() {
            const adWindow = window.open('https://omg10.com/4/10829046', '_blank');
            if (adWindow) {
                adWindow.blur();
                window.focus();
            }
        }, 800);

        // Limpiar estilos después de un momento
        setTimeout(() => {
            status.innerText = "";
            btnCopiar.style.background = "#22c55e";
        }, 4000);
    });
</script>

</body>
</html>
